name: C++ CI with Allegro 5

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest # Switches the machine to Windows
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Installs Allegro 5 cleanly for Windows using vcpkg
    - name: Install Allegro 5 via vcpkg
      run: |
        vcpkg install allegro5:x64-windows

    # Compiles natively on Windows using Microsoft's C++ Compiler (MSVC)
    - name: Compile Game for Windows (.exe)
      run: |
        cl.exe /std:c++17 *.cpp /Fe:FantasyGame.exe `
          /I"C:\vcpkg\installed\x64-windows\include" `
          /link /LIBPATH:"C:\vcpkg\installed\x64-windows\lib" `
          allegro.lib allegro_main.lib allegro_image.lib `
          allegro_audio.lib allegro_acodec.lib allegro_font.lib `
          allegro_ttf.lib allegro_primitives.lib allegro_dialog.lib

    # --- Simple CD Component ---
    - name: Upload Windows Build Artifact
      uses: actions/unlock-artifact@v4
      with:
        name: FantasyGame-Windows-Build
        path: |
          FantasyGame.exe
          C:\vcpkg\installed\x64-windows\bin\*.dll
