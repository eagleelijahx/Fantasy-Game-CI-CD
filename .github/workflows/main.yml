name: C++ CI & CD with Allegro 5

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# This ensures the runner uses the current standard for Node.js actions
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write # Required to allow the workflow to create a GitHub Release

    steps:
    # 1. Pull the code from your repository
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Speed up build time by restoring previously compiled vcpkg libraries
    - name: Restore vcpkg artifacts from cache
      uses: actions/cache@v4
      with:
        path: |
          C:/vcpkg/downloads
          C:/vcpkg/installed
          ~/.vpkg
        key: ${{ runner.os }}-vcpkg-dynamic-${{ hashFiles('**/vcpkg.json') }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-dynamic-

    # 3. Install Allegro 5 dependencies needed for compilation
    - name: Install Allegro 5 via vcpkg
      run: |
        vcpkg install allegro5:x64-windows

    # 4. Initialize the MSVC compiler environment
    - name: Setup MSVC Developer Command Prompt
      uses: ilammy/msvc-dev-cmd@v1

    # 5. Compile the C++ code and bundle assets into a ZIP file
    - name: Compile Game and Bundle Assets
      run: |
        # Create a proxy header to resolve common C++ header issues
        mkdir bits -ErrorAction SilentlyContinue
        echo "#include <iostream>" > bits\stdc++.h
        # ... (rest of your includes) ...
        echo "#include <mmsystem.h>" >> bits\stdc++.h
        
        # Compile the game with Allegro link libraries
        cl.exe /std:c++17 /D_HAS_STD_BYTE=0 /DNOMINMAX *.cpp /Fe:FantasyGame.exe /I. /I"C:\vcpkg\installed\x64-windows\include" /link /LIBPATH:"C:\vcpkg\installed\x64-windows\lib" allegro.lib allegro_main.lib allegro_image.lib allegro_audio.lib allegro_acodec.lib allegro_font.lib allegro_ttf.lib allegro_primitives.lib allegro_dialog.lib Winmm.lib
        
        # Prepare the distribution folder
        mkdir dist -ErrorAction SilentlyContinue
        copy FantasyGame.exe dist\
        copy C:\vcpkg\installed\x64-windows\bin\*.dll dist\
        copy *.png dist\ -ErrorAction SilentlyContinue
        copy *.wav dist\ -ErrorAction SilentlyContinue
        copy *.ttf dist\ -ErrorAction SilentlyContinue
        
        # Compress the entire folder into a single ZIP for deployment
        Compress-Archive -Path dist\* -DestinationPath FantasyGame-Windows-Build.zip -Force

    # 6. Authenticate with AWS using my stored Secrets
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-2

    # 7. Upload the generated ZIP to my specific Ohio S3 bucket
    - name: Upload to S3
      run: |
        aws s3 cp FantasyGame-Windows-Build.zip s3://fantasy-game-bucket-928743224072-us-east-2-an/builds/FantasyGame-v1.0.${{ github.run_number }}.zip

    # 8. Create a formal Release on the GitHub repository page
    - name: Publish Direct Zip Release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Build v1.0.${{ github.run_number }}
        draft: false
        prerelease: false
        files: FantasyGame-Windows-Build.zip

