name: C++ CI with Allegro 5
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # --- 1. Caching Step (Speeds up subsequent runs) ---
    - name: Restore vcpkg artifacts from cache
      uses: actions/cache@v4
      with:
        path: |
          C:/vcpkg/downloads
          C:/vcpkg/installed
          ~/.vcpkg
        key: ${{ runner.os }}-vcpkg-dynamic-${{ hashFiles('**/vcpkg.json') }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-dynamic-

    # --- 2. Install Allegro 5 (Back to your original working configuration) ---
    - name: Install Allegro 5 via vcpkg
      run: |
        vcpkg install allegro5:x64-windows

    # --- 3. Setup MSVC Compiler Path ---
    - name: Setup MSVC Developer Command Prompt
      uses: ilammy/msvc-dev-cmd@v1

    # --- 4. Compile + Fix GCC Header + Create ZIP Bundle ---
    - name: Compile Game and Bundle Assets
      run: |
        # Create a fake bits folder to trick MSVC into finding stdc++.h
        mkdir bits -ErrorAction SilentlyContinue
        $headers = '@'
        #include <iostream>
        #include <vector>
        #include <string>
        #include <algorithm>
        '@
        $headers | Out-File -FilePath bits\stdc++.h -Encoding utf8

        # Compile exactly using your original working project configuration
        cl.exe /std:c++17 *.cpp /Fe:FantasyGame.exe `
          /I. `
          /I"C:\vcpkg\installed\x64-windows\include" `
          /link /LIBPATH:"C:\vcpkg\installed\x64-windows\lib" `
          allegro.lib allegro_main.lib allegro_image.lib `
          allegro_audio.lib allegro_acodec.lib allegro_font.lib `
          allegro_ttf.lib allegro_primitives.lib allegro_dialog-static.lib

        # Create a clean deployment folder, gather the files, and compress them into a ZIP
        mkdir dist
        copy FantasyGame.exe dist\
        copy C:\vcpkg\installed\x64-windows\bin\*.dll dist\
        Compress-Archive -Path dist\* -DestinationPath FantasyGame-Windows-Build.zip

    # --- 5. Upload to the Artifacts Tab ---
    - name: Upload Windows Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FantasyGame-Artifact-ZIP
        path: FantasyGame-Windows-Build.zip

    # --- 6. Upload to the Releases Tab ---
    - name: Publish Direct Zip Release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Build v1.0.${{ github.run_number }}
        draft: false
        prerelease: false
        files: FantasyGame-Windows-Build.zip
