name: C++ CI & CD with Allegro 5

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # --- 1. Caching Step (Speeds up subsequent runs) ---
    - name: Restore vcpkg artifacts from cache
      uses: actions/cache@v4
      with:
        path: |
          C:/vcpkg/downloads
          C:/vcpkg/installed
          ~/.vpkg
        key: ${{ runner.os }}-vcpkg-dynamic-${{ hashFiles('**/vcpkg.json') }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-dynamic-
    
    # --- 2. Install Allegro 5 & Integrate ---
    - name: Install Allegro 5 via vcpkg
      run: |
        vcpkg install allegro5:x64-windows
        vcpkg integrate install
   
    # --- 3. Setup MSVC Compiler Path ---
    - name: Setup MSVC Developer Command Prompt
      uses: ilammy/msvc-dev-cmd@v1

    # --- 4. Clean & Transparent Compilation Step ---
    - name: Compile Game and Bundle Assets
      shell: pwsh
      run: |
        # Directly compile your standard C++ files using MSVC
        cl.exe /EHsc /std:c++17 /D_HAS_STD_BYTE=0 /DNOMINMAX *.cpp /Fe:FantasyGame.exe /I. /I"C:/vcpkg/installed/x64-windows/include" /link /LIBPATH:"C:/vcpkg/installed/x64-windows/lib" allegro.lib allegro_main.lib allegro_image.lib allegro_audio.lib allegro_acodec.lib allegro_font.lib allegro_ttf.lib allegro_primitives.lib allegro_dialog.lib Winmm.lib
        
        # Create a clean deployment folder
        New-Item -ItemType Directory -Force -Path "dist"
        
        # Copy executable and compiled system binaries
        Copy-Item -Path "FantasyGame.exe" -Destination "dist/" -Force
        Copy-Item -Path "C:/vcpkg/installed/x64-windows/bin/*.dll" -Destination "dist/" -Force -ErrorAction SilentlyContinue
        
        # Copy game audio assets and fonts into the distribution folder
        Copy-Item -Path "*.png" -Destination "dist/" -Force -ErrorAction SilentlyContinue
        Copy-Item -Path "*.wav" -Destination "dist/" -Force -ErrorAction SilentlyContinue
        Copy-Item -Path "*.ttf" -Destination "dist/" -Force -ErrorAction SilentlyContinue
        
        # Compress everything together into the final game deployment archive
        Compress-Archive -Path "dist/*" -DestinationPath "FantasyGame-Windows-Build.zip" -Force
    
    # --- 5. Upload to the Artifacts Tab ---
    - name: Upload Windows Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FantasyGame-Artifact-ZIP
        path: FantasyGame-Windows-Build.zip

    # --- 6. Configure AWS Credentials (PR-Safe Guard) ---
    - name: Configure AWS Credentials
      if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-2

    # --- 7. Upload to S3 (PR-Safe Guard) ---
    - name: Upload to S3
      if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
      run: |
        aws s3 cp FantasyGame-Windows-Build.zip s3://fantasy-game-bucket-928743224072-us-east-2-an/builds/FantasyGame-v1.0.${{ github.run_number }}.zip
   
    # --- 8. Upload to the Releases Tab ---
    - name: Publish Direct Zip Release
      if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Build v1.0.${{ github.run_number }}
        draft: false
        prerelease: false
        files: FantasyGame-Windows-Build.zip

    # --- 9. Append CloudFront Link to Release Body ---
    - name: Append CloudFront Link to Release
      if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
      shell: pwsh
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        RELEASE_TAG: v1.0.${{ github.run_number }}
        DOWNLOAD_URL: https://dcbc64a200c5t.cloudfront.net/FantasyGame-v1.0.${{ github.run_number }}.zip
      run: |
        # Fetch current release notes safely into a variable to avoid stream file locking
        $notes = gh release view "$env:RELEASE_TAG" --json body --jq .body
        
        # Format the new content string
        $updatedNotes = $notes + "`n`n---`n### 📥 Download via CloudFront (Global CDN)`n[Download Version $env:RELEASE_TAG here]($env:DOWNLOAD_URL)"
        
        # Output to file safely without pipeline lockouts
        $updatedNotes | Out-File -FilePath "current_notes.txt" -Encoding utf8
        
        # Update the release using the static file notes flag
        gh release edit "$env:RELEASE_TAG" --notes-file "current_notes.txt"
