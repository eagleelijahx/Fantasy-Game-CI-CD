name: C++ CI with Allegro 5

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Windows Cross-Compiler and Allegro 5
      run: |
        sudo apt-get update
        # Installs the MinGW cross-compiler and the Windows version of Allegro 5
        sudo apt-get install -y build-essential mingw-w64 binutils-mingw-w64 g++-mingw-w64

    - name: Compile Game for Windows (.exe)
      run: |
        # Using the MinGW compiler instead of standard Linux g++
        x86_64-w64-mingw32-g++ -std=c++17 *.cpp -o FantasyGame.exe \
          -lallegro-static \
          -lallegro_main-static \
          -lallegro_image-static \
          -lallegro_audio-static \
          -lallegro_acodec-static \
          -lallegro_font-static \
          -lallegro_ttf-static \
          -lallegro_primitives-static \
          -lallegro_dialog-static \
          -lwinmm -lgdi32 -luser32 -lole32 -lshlwapi

    # --- Simple CD Component ---
    - name: Upload Windows Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FantasyGame-Windows-Build
        path: FantasyGame.exe
